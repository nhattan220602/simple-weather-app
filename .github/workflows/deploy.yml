name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Config File
        run: echo "const apiKey = '${{ secrets.WEATHER_API_KEY }}';" > src/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'src'        # ← serve từ folder src/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4